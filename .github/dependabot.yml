version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      commit-message:
          prefix: chore(deps)
      # Dependency cooldown: let fresh releases soak before PRs are opened
      # (supply-chain worm waves 2025-2026 were typically remediated within days).
      cooldown:
          default-days: 7
          semver-major-days: 14
      groups:
          production-dependencies:
              dependency-type: production
          development-dependencies:
              dependency-type: development
      # ESLint 10 ecosystem: most plugins (jsx-a11y, react, react-hooks) declare
      # peer deps up to ^9 only. Ignore until plugin ecosystem catches up.
      ignore:
          - dependency-name: eslint
            versions: ['>=10']
          - dependency-name: '@eslint/js'
            versions: ['>=10']

    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
      commit-message:
          prefix: ci(deps)
      groups:
          actions:
              patterns: ['*']
