name: CI

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]

# Cancel in-progress runs on the same branch when a new commit is pushed.
# Master pushes are never cancelled (allow full pipeline to finish).
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
    validate:
        runs-on: ubuntu-latest
        env:
            HUSKY: '0'

        strategy:
            matrix:
                node-version: [24.x]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Audit dependencies
              run: npm audit --audit-level=moderate

            # Type check first — fast feedback before slow linting
            - name: Type check
              run: npm run typecheck

            # oxlint: Rust-based linter (~100x faster than ESLint)
            # Catches basic errors instantly; ESLint handles TS-specific rules after
            - name: Lint (oxlint)
              run: npm run lint:oxlint

            - name: Lint (ESLint)
              run: npm run lint

            - name: Check Formatting
              run: npm run format:check

            # Coverage run enforces thresholds defined in vitest.config.ts.
            # Plain `test` skips thresholds — always use `test:coverage` in CI.
            - name: Run Tests with Coverage
              run: npm run test:coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

            - name: Production build
              run: npm run build

            - name: Verify Web Vitals chunk split (default build)
              run: npm run verify:web-vitals-chunks

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright (Chromium only)
              run: npx playwright install --with-deps chromium

            - name: End-to-end tests (Playwright)
              run: npm run test:e2e
              env:
                  CI: true
